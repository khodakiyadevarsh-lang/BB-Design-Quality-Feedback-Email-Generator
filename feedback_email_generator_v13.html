.hdr{background:linear-gradient(135deg,#280a80 0%,#4c28b3 50%,#7049e2 100%);padding:26px 32px 20px;position:relative;overflow:hidden}

admin whenever it is required.","required product changes not updated on admin":"Please update all required product changes on admin.","status not changed":"Always update the correct status based on the order stage.","ticket not created":"Please create a ticket whenever required by the process.","wrong status updated":"Always use the correct status based on the scenarios informing to the customer.","enhance not used":"Please use enhancement whenever artwork quality improvement is required.","call ticket/notes not updated":"Please update call tickets and notes after customer communication.","canned response not used":"Always use the correct and full canned response based on the scenario.","comparision not done":"Please compare all relevant files and information before proceeding.","file not kept in the folder":"Please save the file in the correct folder location.","flatten file saved in folder":"Please save the correct editable file in the designated folder.","folder path not updated in initial level":"Please update the folder path correctly at the initial stage.","fonts package not saved":"Please save the font package whenever required.","incorrect alignment_dpe":"Please verify artwork alignment before finalizing the file.","incorrect file format":"Please use the correct file format as per process requirements.","incorrect proof action":"Please use the correct proof action based on the scenario.","paper template not created":"Please create the paper template whenever it is required.","proof name not used":"Please use the correct proof naming convention.","recreation format not followed":"Please follow the standard recreation format whenever recreation is performed.","screenshot not kept in folder":"Please save the required screenshot in the correct folder.","smart object not created":"Please create smart objects whenever required.","unwanted object/text in the artwork_dpe":"Please remove all unwanted objects and text before finalizing the artwork.","view file not kept in tiff/al file":"Please maintain the view file in the required TIFF/AI file."};

function getKP(r){return RCA_MAP[r.trim().toLowerCase()]||null;}
function normRCA(s){return s.trim().toLowerCase();}
const BC_COLS=[15,17,20,21,22,24,26,29,31,32];
const SKIP=new Set(['na','n/a','no','yes','none','[list]','']);
function computeBC(row){return BC_COLS.map(i=>(row[i]!=null?String(row[i]).trim():'')).filter(v=>v&&!SKIP.has(v.toLowerCase())).join('; ');}

// THE KEY FIX: Convert Excel serial number to YYYY-MM-DD using UTC
// Excel serial 1 = Jan 1 1900. We add days to UTC epoch to avoid timezone shifts.
function excelSerialToYMD(serial){
  // Excel wrongly treats 1900 as leap year, so offset is 25569 for Unix epoch (Jan 1 1970)
  // Use integer math to avoid floating point/timezone issues
  const days = Math.floor(serial) - 25569;
  const ms = days * 86400 * 1000;
  const d = new Date(ms);
  const y = d.getUTCFullYear();
  const m = String(d.getUTCMonth()+1).padStart(2,'0');
  const day = String(d.getUTCDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

// Convert any value in col F to YYYY-MM-DD string for comparison
function toYMD(v){
  if(!v && v!==0) return '';
  // Excel numeric serial (XLSX reads date cells as numbers when raw:true)
  if(typeof v === 'number') return excelSerialToYMD(v);
  // String formats: DD-MM-YYYY or DD/MM/YYYY
  const s = String(v).trim();
  // YYYY-MM-DD already
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  // DD-MM-YYYY or DD/MM/YYYY
  const m = s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
  if(m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  return '';
}

// Display as DD-MM-YYYY
function dispYMD(ymd){
  if(!ymd) return '';
  const [y,m,d] = ymd.split('-');
  return `${d}-${m}-${y}`;
}

let allRows=[], dMap={}, dList=[], curIdx=0, allDates=[];

function showErr(m){const e=document.getElementById('er');e.textContent=m;e.style.display=m?'block':'none';}
function onDrop(e){e.preventDefault();document.getElementById('dz').classList.remove('drag');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);}

function loadFile(file){
  if(!file) return; showErr('');
  const r = new FileReader();
  r.onload = ev => {
    try{
      // raw:true keeps dates as Excel serial numbers — we parse them ourselves with UTC
      const wb = XLSX.read(ev.target.result, {type:'array', cellDates:false});
      const aoa = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, defval:'', raw:true});
      if(aoa.length < 2){showErr('No data found.'); return;}
      allRows = aoa.slice(1).filter(r => (r[6]||'').toString().trim());
      populateFilters();
      applyFilters();
      document.getElementById('fc').style.display = 'block';
      document.getElementById('dz').querySelector('.uz-t').textContent = '✅ File loaded — '+allRows.length+' rows found';
    }catch(ex){showErr('Error: '+ex.message);}
  };
  r.readAsArrayBuffer(file);
}

function uniqSorted(arr){return[...new Set(arr)].filter(Boolean);}

function populateFilters(){
  const qas = uniqSorted(allRows.map(r=>(r[4]||'').toString().trim())).sort();
  const weeks = uniqSorted(allRows.map(r=>(r[1]||'').toString().trim())).sort((a,b)=>Number(a)-Number(b));
  allDates = uniqSorted(allRows.map(r=>toYMD(r[5])).filter(Boolean)).sort();

  fill('fqa', qas, 'All QAs');
  fill('fweek', weeks, 'All Weeks');
  fillDates('fdate1', 'From — All Dates');
  fillDates('fdate2', 'To — All Dates');
}

function fill(id, items, ph){
  const s=document.getElementById(id), cur=s.value;
  s.innerHTML=`<option value="">${ph}</option>`;
  items.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;s.appendChild(o);});
  if(cur) s.value=cur;
}

function fillDates(id, ph){
  const s=document.getElementById(id), cur=s.value;
  s.innerHTML=`<option value="">${ph}</option>`;
  allDates.forEach(d=>{
    const o=document.createElement('option');
    o.value=d;                // YYYY-MM-DD for comparison
    o.textContent=dispYMD(d); // DD-MM-YYYY for display
    s.appendChild(o);
  });
  if(cur) s.value=cur;
}

function applyFilters(){
  const qa   = document.getElementById('fqa').value;
  const week = document.getElementById('fweek').value;
  const d1   = document.getElementById('fdate1').value;
  const d2   = document.getElementById('fdate2').value;

  const filtered = allRows.filter(r=>{
    if(qa   && (r[4]||'').toString().trim() !== qa)   return false;
    if(week && (r[1]||'').toString().trim() !== week) return false;
    if(d1 || d2){
      const dk = toYMD(r[5]);
      if(!dk) return false;
      if(d1 && dk < d1) return false;
      if(d2 && dk > d2) return false;
    }
    return true;
  });

  dMap={};
  filtered.forEach(row=>{
    const d=(row[6]||'').toString().trim();
    if(!d) return;
    if(!dMap[d]) dMap[d]=[];
    dMap[d].push(row);
  });
  dList=Object.keys(dMap).sort();

  document.getElementById('sb').style.display='flex';
  document.getElementById('sb-rows').textContent=filtered.length;
  document.getElementById('sb-designers').textContent=dList.length;
  const parts=[];
  if(qa)   parts.push('QA: '+qa);
  if(week) parts.push('Week '+week);
  if(d1||d2) parts.push((d1?dispYMD(d1):'Start')+' → '+(d2?dispYMD(d2):'End'));
  const fc=document.getElementById('sb-fc');
  if(parts.length){fc.style.display='flex';document.getElementById('sb-ft').textContent='🔽 '+parts.join(' · ');}
  else fc.style.display='none';

  const sel=document.getElementById('ds');
  sel.innerHTML='<option value="">— Select Designer —</option>';
  dList.forEach((d,i)=>{const o=document.createElement('option');o.value=i;o.textContent=d;sel.appendChild(o);});
  document.getElementById('dn').style.display=dList.length?'flex':'none';
  document.getElementById('ec').style.display='none';
  curIdx=0; updateNav();
}

function resetFilters(){
  ['fqa','fweek','fdate1','fdate2'].forEach(id=>document.getElementById(id).value='');
  applyFilters();
}

function showD(val){
  if(val==='') return;
  curIdx=parseInt(val);
  document.getElementById('ec').style.display='block';
  updateNav(); renderEmail();
}
function updateNav(){
  document.getElementById('nl').textContent=dList.length?(curIdx+1)+' / '+dList.length:'0 / 0';
  document.getElementById('pb').disabled=curIdx===0;
  document.getElementById('nb2').disabled=curIdx>=dList.length-1;
}
function nav(d){
  curIdx=Math.max(0,Math.min(dList.length-1,curIdx+d));
  document.getElementById('ds').value=curIdx;
  document.getElementById('ec').style.display='block';
  updateNav(); renderEmail();
}

function renderEmail(){
  const dName=dList[curIdx];
  const rows=dMap[dName];
  const firstName=dName.split('[')[0].trim().split(' ')[0];
  const month=(rows[0][2]||'').toString().trim();
  const year=(rows[0][3]||'').toString().trim();
  const monthYear=year?month+' '+year:month;

  let fatal=0,nonFatal=0;
  rows.forEach(r=>{
    const fs=(r[41]||'').toString().trim().toLowerCase();
    if(fs==='fatal') fatal++;
    else if(fs.includes('non')) nonFatal++;
  });
  const total=fatal+nonFatal;

  let ss=0,sc=0;
  rows.forEach(r=>{const s=parseFloat(r[47]);if(!isNaN(s)){ss+=s;sc++;}});
  const avgN=sc?ss/sc:0;
  const avgS=sc?avgN.toFixed(2)+'%':'N/A';
  const scoreColor=avgN>=85?'#c8e6c9':avgN>=70?'#fff9c4':'#ffcdd2';
  const scoreTxt=avgN>=85?'#1b5e20':avgN>=70?'#827717':'#b71c1c';

  const rcaN={};
  rows.forEach(r=>{
    const bc=computeBC(r);
    if(!bc) return;
    bc.split(';').forEach(e=>{
      const raw=e.trim();
      if(!raw||SKIP.has(raw.toLowerCase())) return;
      const nk=normRCA(raw);
      if(!rcaN[nk]) rcaN[nk]={label:raw,count:0};
      rcaN[nk].count++;
    });
  });
  const rcaE=Object.values(rcaN).sort((a,b)=>b.count-a.count);

  const seenKP=new Set(); const kps=[];
  rcaE.forEach(({label})=>{const kp=getKP(label);if(kp&&!seenKP.has(kp)){seenKP.add(kp);kps.push(kp);}});

  const scoreMsg=avgN>=85
    ?`Your current score for <strong>${monthYear}</strong> is <strong>${avgS}</strong>, which is a great score. Keep up the excellent work and maintain this quality consistently.`
    :avgN>=70
    ?`Your current score for <strong>${monthYear}</strong> is <strong>${avgS}</strong>, which is an average score. Please focus more on quality checks and avoid repeating similar mistakes. With better attention to detail, you can achieve a much higher score.`
    :`Your current score for <strong>${monthYear}</strong> is <strong>${avgS}</strong>. There is significant room for improvement. Please review the errors above carefully and ensure they are not repeated.`;

  const auditTbl=`<table style="border-collapse:collapse;font-family:Aptos,Arial,sans-serif;font-size:13px;margin:8px 0"><thead><tr>
    <th style="background:#d4c4f6;color:#280a80;font-weight:700;border:1px solid #b0a0e0;padding:7px 14px">Month</th>
    <th style="background:#d4c4f6;color:#280a80;font-weight:700;border:1px solid #b0a0e0;padding:7px 14px">Designer's Name [CP ID]</th>
    <th style="background:#d4c4f6;color:#280a80;font-weight:700;border:1px solid #b0a0e0;padding:7px 14px">Fatal</th>
    <th style="background:#d4c4f6;color:#280a80;font-weight:700;border:1px solid #b0a0e0;padding:7px 14px">Non-Fatal</th>
    <th style="background:#d4c4f6;color:#280a80;font-weight:700;border:1px solid #b0a0e0;padding:7px 14px">Total Audits</th>
    <th style="background:#d4c4f6;color:#280a80;font-weight:700;border:1px solid #b0a0e0;padding:7px 14px">Average Score</th>
    </tr></thead><tbody><tr>
    <td style="background:#fff;border:1px solid #ccc;padding:6px 14px;text-align:center">${monthYear}</td>
    <td style="background:#fff;border:1px solid #ccc;padding:6px 14px;text-align:center">${dName}</td>
    <td style="border:1px solid #ccc;padding:6px 14px;text-align:center">${fatal}</td>
    <td style="border:1px solid #ccc;padding:6px 14px;text-align:center">${nonFatal}</td>
    <td style="border:1px solid #ccc;padding:6px 14px;text-align:center">${total}</td>
    <td style="background:${scoreColor};color:${scoreTxt};font-weight:700;border:1px solid #ccc;padding:6px 14px;text-align:center">${avgS}</td>
    </tr></tbody></table>`;

  const rcaTbl=rcaE.length?`<table style="border-collapse:collapse;font-family:Aptos,Arial,sans-serif;font-size:13px;margin:8px 0;min-width:340px"><thead><tr>
    <th style="background:#d4c4f6;color:#280a80;font-weight:700;border:1px solid #b0a0e0;padding:7px 14px;text-align:left;min-width:300px">RCA of Errors</th>
    <th style="background:#d4c4f6;color:#280a80;font-weight:700;border:1px solid #b0a0e0;padding:7px 14px;text-align:center;min-width:60px">Count</th>
    </tr></thead><tbody>${rcaE.map(({label,count})=>`<tr>
    <td style="background:#fff;border:1px solid #ccc;padding:6px 14px">${label}</td>
    <td style="background:#ffcdd2;color:#b71c1c;font-weight:700;border:1px solid #ccc;padding:6px 14px;text-align:center">${count}</td>
    </tr>`).join('')}</tbody></table>`:'';

  const kpHTML=kps.length
    ?`<ul style="margin:6px 0 0 20px;padding:0;font-family:Aptos,Arial,sans-serif;font-size:14px">${kps.map(p=>`<li style="margin-bottom:5px">${p}</li>`).join('')}</ul>`
    :`<ul style="margin:6px 0 0 20px;padding:0"><li style="font-family:Aptos,Arial,sans-serif;font-size:14px">Please follow the standard design process and maintain consistent quality across all orders.</li></ul>`;

  document.getElementById('pv').innerHTML=`
    <p style="font-family:Aptos,Arial,sans-serif;font-size:14px;margin-bottom:10px">Hello ${firstName},</p>
    <p style="font-family:Aptos,Arial,sans-serif;font-size:14px;margin-bottom:10px">Hope you are doing well.</p>
    <p style="font-family:Aptos,Arial,sans-serif;font-size:14px;margin-bottom:10px">Please find below your <strong>Monthly Design Quality 1:1 feedback</strong> detail of month <strong>${monthYear}</strong>.</p>
    <div class="sec-h">📊 Audit Summary:</div>${auditTbl}
    ${rcaE.length?`<div class="sec-h">📌 RCAs of Errors:</div>${rcaTbl}`:''}
    <div class="sec-h">✅ Key Points to Learn:</div>${kpHTML}
    <div class="sec-h">💬 Overall Comments:</div>
    <p style="font-family:Aptos,Arial,sans-serif;font-size:14px;margin-bottom:10px">${scoreMsg}</p>
    <p style="font-family:Aptos,Arial,sans-serif;font-size:14px">Please feel free to reach out to me for any queries.</p>`;
}

function copyEmailHTML(){
  const body=document.getElementById('pv');
  const btn=document.getElementById('cpb');
  const wrapper=`<div style="font-family:Aptos,Arial,sans-serif;font-size:14px;color:#1a0a4a;line-height:1.8">${body.innerHTML}</div>`;
  try{
    const hb=new Blob([wrapper],{type:'text/html'});
    const tb=new Blob([body.innerText],{type:'text/plain'});
    navigator.clipboard.write([new ClipboardItem({'text/html':hb,'text/plain':tb})]).then(()=>{
      btn.textContent='✅ Copied!'; setTimeout(()=>{btn.textContent='📋 Copy Email';},2500);
    }).catch(()=>fallback(body,btn));
  }catch(e){fallback(body,btn);}
}
function fallback(body,btn){
  const tmp=document.createElement('div');
  tmp.setAttribute('contenteditable','true');
  tmp.style.cssText='position:fixed;left:-9999px;top:0;opacity:0;pointer-events:none';
  tmp.innerHTML=body.innerHTML;
  document.body.appendChild(tmp);
  const range=document.createRange(); range.selectNodeContents(tmp);
  const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
  document.execCommand('copy'); sel.removeAllRanges(); document.body.removeChild(tmp);
  btn.textContent='✅ Copied!'; setTimeout(()=>{btn.textContent='📋 Copy Email';},2500);
}
</script>
